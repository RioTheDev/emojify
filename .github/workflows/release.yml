name: Release Build

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  arch-binary-x86_64:
    name: "Build Arch Binary (x86_64)"
    runs-on: self-hosted
    container:
      image: archlinux:base-devel
      options: --privileged
      volumes:
        - /tmp/emojify/pacman-cache-x86_64:/var/cache/pacman/pkg
    steps:
      - uses: actions/checkout@v6
      - name: Update System and Install Deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            meson \
            gcc \
            pkgconf \
            gtkmm-4.0 \
            glibmm-2.68 \
            libadwaita \
            git \
            tar
      - name: Compile
        run: |
          meson setup --prefix=/usr build
          meson compile -C build
          DESTDIR=$(pwd)/dist meson install -C build
          tar -czvf emojify-x86_64.tar.gz -C dist .
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-x86_64
          path: emojify-x86_64.tar.gz

  arch-binary-aarch64:
    name: "Build Arch Binary (aarch64)"
    needs: arch-binary-x86_64
    runs-on: self-hosted
    container:
      image: archlinux:base-devel
      options: --privileged
      volumes:
        - /tmp/emojify/pacman-cache-aarch64:/var/cache/pacman/pkg
    steps:
      - uses: actions/checkout@v6
      - name: Install Docker CLI
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm docker
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64
      - name: Update System and Install Deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            meson \
            gcc \
            pkgconf \
            gtkmm-4.0 \
            glibmm-2.68 \
            libadwaita \
            git \
            tar
      - name: Compile
        run: |
          meson setup --prefix=/usr build
          meson compile -C build
          DESTDIR=$(pwd)/dist meson install -C build
          tar -czvf emojify-aarch64.tar.gz -C dist .
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-aarch64
          path: emojify-aarch64.tar.gz

  publish:
    name: Publish Release
    needs:
      - arch-binary-x86_64
      - arch-binary-aarch64
    runs-on: self-hosted
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./assets

      - name: Prepare Release Assets
        run: |
          mkdir -p release_dist
          find ./assets -name "*.tar.gz" -exec cp {} ./release_dist/ \;
          cd release_dist
          sha256sum * > checksums.txt
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: true
          prerelease: false
          files: release_dist/*
