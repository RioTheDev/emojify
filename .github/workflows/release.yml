name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  flatpak:
    name: "Build Flatpak"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: emojify.flatpak
          manifest-path: xyz.riothedev.emojify.json
          cache-key: flatpak-builder-${{ hashFiles('xyz.riothedev.emojify.json') }}

  arch-binary:
    name: "Build Arch Binary"
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Update System and Install Deps
        run: pacman -Syu --noconfirm && pacman -S --noconfirm meson gcc pkgconf gtkmm-4.0 glibmm-2.68 libadwaita git
      - uses: actions/checkout@v4
      - name: Compile
        run: |
          meson setup --prefix=/usr build
          meson compile -C build
          DESTDIR=$(pwd)/dist meson install -C build
          tar -czvf emojify-x86_64.tar.gz -C dist .
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: emojify-binary
          path: emojify-x86_64.tar.gz

  publish:
    needs: [flatpak, arch-binary]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            emojify-binary/emojify-x86_64.tar.gz
            emojify-flatpak/emojify.flatpak
