name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  arch-binary:
    name: "Build Arch Binary (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: self-hosted
            container-image: "archlinux:base-devel"

          - arch: aarch64
            runner: [self-hosted, arm64]
            container-image: "agners/archlinuxarm:latest"

    container:
      image: ${{ matrix.container-image }}
      volumes:
        - /tmp/emojify/pacman-cache-${{ matrix.arch }}:/var/cache/pacman/pkg
    steps:
      - uses: actions/checkout@v6

      - name: Update System and Install Deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            meson gcc pkgconf gtkmm-4.0 glibmm-2.68 libadwaita git tar nodejs

      - name: Compile
        run: |
          meson setup --prefix=/usr build
          meson compile -C build
          DESTDIR=$(pwd)/dist meson install -C build
          tar -czvf emojify-${{ matrix.arch }}.tar.gz -C dist .

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-${{ matrix.arch }}
          path: emojify-${{ matrix.arch }}.tar.gz

  appimage:
    name: "Build AppImage ${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: self-hosted
            linuxdeploy-url: "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          - arch: aarch64
            runner: [self-hosted, arm64]
            linuxdeploy-url: "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage"
    container:
      image: ubuntu:24.04
      options: --device /dev/fuse --cap-add SYS_ADMIN
    steps:
      - uses: actions/checkout@v6

      - name: Install Build Deps
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            meson g++ pkg-config libgtkmm-4.0-dev libadwaita-1-dev \
            desktop-file-utils appstream wget file sudo nodejs

      - name: Configure and Build
        run: |
          meson setup --prefix=/usr build
          meson compile -C build
          DESTDIR=$(pwd)/AppDir meson install -C build

      - name: Download and Setup linuxdeploy
        run: |
          wget -O linuxdeploy ${{ matrix.linuxdeploy-url }}
          chmod +x linuxdeploy

      - name: Pack AppImage
        env:
          OUTPUT: Emojify-${{ matrix.arch }}.AppImage
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          ./linuxdeploy --appdir AppDir \
            --output appimage
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Emojify-${{ matrix.arch }}
          path: "*.AppImage"

  publish:
    name: Publish Release
    needs:
      - arch-binary
      - appimage
    runs-on: self-hosted
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./assets

      - name: Prepare Release Assets
        run: |
          mkdir -p release_dist
          find ./assets -name "*.tar.gz" -exec cp {} ./release_dist/ \;
          find ./assets -name "*.AppImage" -exec cp {} ./release_dist/ \;
          cd release_dist
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: true
          prerelease: false
          files: release_dist/*
