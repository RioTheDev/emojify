name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  arch-binary:
    name: "Build Arch Binary (x86_64)"
    runs-on: [self-hosted, X64]
    strategy:
      fail-fast: false
    container:
      image: archlinux:base-devel
      volumes:
        - /tmp/emojify/pacman-cache:/var/cache/pacman/pkg
    steps:
      - uses: actions/checkout@v6

      - name: Update System and Install Deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            meson gcc pkgconf gtkmm-4.0 glibmm-2.68 libadwaita git tar nodejs

      - name: Compile
        run: |
          meson setup --prefix=/usr build
          meson compile -C build
          DESTDIR=$(pwd)/dist meson install -C build
          tar -czvf emojify-x86_64.tar.gz -C dist .

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-x86_64
          path: emojify-x86_64.tar.gz

  appimage:
    name: "Build AppImage ${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: [self-hosted, X64]
            linuxdeploy-url: "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          - arch: aarch64
            runner: [self-hosted, ARM64]
            linuxdeploy-url: "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage"
    container:
      image: ubuntu:24.04
      options: --device /dev/fuse --cap-add SYS_ADMIN
      volumes:
        - /tmp/emojify/apt-cache-${{ matrix.arch }}:/var/cache/apt/archives
    steps:
      - uses: actions/checkout@v6

      - name: Install Build Deps
        run: |
          export DEBIAN_FRONTEND=noninteractive

          rm -f /etc/apt/apt.conf.d/docker-clean
          echo 'Binary::apt::APT::Keep-Downloaded-Packages "true";' > /etc/apt/apt.conf.d/keep-cache

          apt-get update
          apt-get install -y \
            meson g++ pkg-config libgtkmm-4.0-dev libadwaita-1-dev \
            desktop-file-utils appstream wget file sudo nodejs \
            libglib2.0-bin wl-clipboard

      - name: Configure and Build
        run: |
          meson setup --prefix=/usr build
          meson compile -C build
          DESTDIR=$(pwd)/AppDir meson install -C build

      - name: Download and Setup linuxdeploy
        run: |
          wget -O linuxdeploy ${{ matrix.linuxdeploy-url }}
          chmod +x linuxdeploy
          wget -O linuxdeploy-plugin-gtk.sh https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-plugin-gtk.sh

      - name: Make AppDir
        env:
          DEPLOY_GTK_VERSION: "4"
        run: |
          ./linuxdeploy --appdir AppDir \
            --plugin gtk \
            --executable /usr/bin/wl-copy
      - name: Patch Apprun hook
        run: |
          sed -i \
            -e 's/export GDK_BACKEND=x11/export GDK_BACKEND=wayland,x11/' \
            -e 's/export GTK_THEME=.*/unset GTK_THEME/' \
            -e '/GTK_DATA_PREFIX/d' \
            AppDir/apprun-hooks/linuxdeploy-plugin-gtk.sh
      - name: Pack AppImage
        run: |
          wget -O appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage
          chmod +x appimagetool
          ./appimagetool AppDir Emojify-${{ matrix.arch }}.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Emojify-${{ matrix.arch }}
          path: "*.AppImage"
  publish-github:
    name: Publish Release To Github
    needs:
      - arch-binary
      - appimage
    runs-on: self-hosted
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./assets

      - name: Prepare Release Assets
        run: |
          mkdir -p release_dist
          find ./assets -name "*.tar.gz" -exec cp {} ./release_dist/ \;
          find ./assets -name "*.AppImage" -exec cp {} ./release_dist/ \;
          cd release_dist
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: true
          prerelease: false
          files: release_dist/*
      - name: Upload Checksums for AUR Job
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: release_dist/checksums.txt
  publish-aur:
    name: Publish to AUR
    needs: publish-github
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Fetch Release Checksums
        uses: actions/download-artifact@v4
        with:
          name: release-checksums
          path: release_dist

      - name: Check Dir
        run: |
          cat release_dist/checksums.txt

      - name: Generate PKGBUILD via Python
        env:
          TARGET: x86_64
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          chmod +x ./ci/generate_pkgbuild.py
          ./ci/generate_pkgbuild.py
      - name: Check PKGBUILD
        run: |
          cat ./pkgbuild/emojify-bin/PKGBUILD
      - name: Deploy to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: emojify-bin
          pkgbuild: ./pkgbuild/emojify-bin/PKGBUILD
          updpkgsums: false
          commit_username: "RioTheDev"
          commit_email: "dateshidze.gio@gmail.com"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
