name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  flatpak:
    name: "Build Flatpak"
    runs-on: self-hosted
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged -v /home/riothedev/.flatpak-builder/emojify:/flatpak-cache
    steps:
      - uses: actions/checkout@v6
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: emojify.flatpak
          manifest-path: xyz.riothedev.emojify.json
          cache: false
          state-dir: /flatpak-cache
          build-dir: /flatpak-cache/build
  arch-binary:
    name: "Build Arch Binary"
    runs-on: self-hosted
    container: archlinux:base-devel
    steps:
      - name: Update System and Install Deps
        run: pacman -Syu --noconfirm && pacman -S --noconfirm meson gcc pkgconf gtkmm-4.0 glibmm-2.68 libadwaita git
      - uses: actions/checkout@v6
      - name: Compile
        run: |
          meson setup --prefix=/usr build
          meson compile -C build
          DESTDIR=$(pwd)/dist meson install -C build
          tar -czvf emojify-x86_64.tar.gz -C dist .
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v7
        with:
          name: emojify-binary
          path: emojify-x86_64.tar.gz

  publish:
    needs: [flatpak, arch-binary]
    runs-on: self-hosted
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
      - name: List files
        run: find . -type f
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            emojify-binary/emojify-x86_64.tar.gz
            emojify-x86_64.flatpak/emojify.flatpak
