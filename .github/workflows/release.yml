name: Release Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
permissions:
  contents: write

jobs:
  flatpak:
    if: false
    name: "Build Flatpak (${{ matrix.arch }})"
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
      volumes:
        - /tmp/emojify/flatpak-builder-${{ matrix.arch }}:/flatpak-cache
    steps:
      - uses: actions/checkout@v6
      - name: Install Docker Binaries (for ARM emulation)
        if: matrix.arch == 'aarch64'
        run: |
          curl https://download.docker.com/linux/static/stable/x86_64/docker-26.0.0.tgz --output ./docker.tgz
          tar xzvf docker.tgz
          mv docker/* /usr/bin/

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: emojify-${{ matrix.arch }}.flatpak
          manifest-path: xyz.riothedev.emojify.json
          cache: false
          state-dir: /flatpak-cache
          build-dir: /flatpak-cache/build
          arch: ${{ matrix.arch }}

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v7
        with:
          name: flatpak-${{ matrix.arch }}
          path: emojify-${{ matrix.arch }}.flatpak

  arch-binary:
    name: "Build Arch Binary (${{ matrix.arch }})"
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64]
    container:
      image: archlinux:base-devel
      options: --privileged
      volumes:
        - /tmp/emojify/pacman-cache-${{ matrix.arch }}:/var/cache/pacman/pkg
    steps:
      - uses: actions/checkout@v6

      - name: Install Docker CLI
        if: matrix.arch == 'aarch64'
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm docker

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Update System and Install Deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm meson gcc pkgconf gtkmm-4.0 glibmm-2.68 libadwaita git tar

      - name: Compile
        run: |
          meson setup --prefix=/usr build
          meson compile -C build
          DESTDIR=$(pwd)/dist meson install -C build
          tar -czvf emojify-${{ matrix.arch }}.tar.gz -C dist .

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-${{ matrix.arch }}
          path: emojify-${{ matrix.arch }}.tar.gz

  publish:
    needs: [flatpak, arch-binary]
    runs-on: self-hosted
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./assets

      - name: Prepare Release Assets
        run: |
          mkdir -p release_dist
          find ./assets -name "*.tar.gz" -exec cp {} ./release_dist/ \;
          find ./assets -name "*.flatpak" -exec cp {} ./release_dist/ \;
          cd release_dist && sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: true
          prerelease: false
          files: release_dist/*
